[train]
data_file = ["../data/kolmogorov_dns/kolmogorov_dns_10000.npy"]
field = "uvp"
num_sensors = 50
horizon_steps = 10
temporal_stride = 1
burn_in_steps = 100
train_ratio = 0.8
val_ratio = 0.1

# Physics: 論文密度但減小 branch batch 以省記憶體
physics_stride = 32
data_loss_weight = 20.0
physics_loss_weight = 1.0
physics_time_samples = 2
physics_branch_batch_size = 2
physics_continuity_weight = 1.0
physics_causal_epsilon = 1.0
time_fourier_modes = 8

iterations = 20000
batch_size = 32
optimizer = "adamw"
learning_rate = 0.001
weight_decay = 0.0001
lr_schedule = "step"
min_learning_rate = 1e-6
lr_step_size = 10000
lr_step_gamma = 0.5
rollout_steps = 10
checkpoint_period = 5000

# 縮小模型以適應 MPS 記憶體（~570k 參數）
branch_hidden_dims = [256, 256]
trunk_hidden_dims = [256, 256]
latent_width = 128
use_gated_mlp = false
use_resnet_branch = true
trunk_rff_features = 256
trunk_rff_sigma = 10.0

early_stop_total_loss = 1e-4
seed = 42
artifacts_dir = "../artifacts/local-resnet-rff"
