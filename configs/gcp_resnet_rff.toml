[train]
data_file = ["../data/kolmogorov_dns/kolmogorov_dns_10000.npy"]
field = "uvp"
num_sensors = 50
horizon_steps = 10
temporal_stride = 1
burn_in_steps = 100
train_ratio = 0.8
val_ratio = 0.1

# 論文對齊物理設定
physics_stride = 32
data_loss_weight = 20.0
physics_loss_weight = 1.0
physics_time_samples = 4
physics_branch_batch_size = 4
physics_continuity_weight = 1.0
physics_causal_epsilon = 1.0
time_fourier_modes = 8

iterations = 20000
batch_size = 32
optimizer = "adamw"
learning_rate = 0.001
weight_decay = 0.0001
lr_schedule = "step"
min_learning_rate = 1e-6
lr_step_size = 10000
lr_step_gamma = 0.5
rollout_steps = 10
checkpoint_period = 5000

# 論文原始模型尺寸（GCP CUDA）
branch_hidden_dims = [512, 512]
trunk_hidden_dims = [512, 512]
latent_width = 256
use_gated_mlp = false
use_resnet_branch = true
trunk_rff_features = 256
trunk_rff_sigma = 10.0

early_stop_total_loss = 1e-4
seed = 42
artifacts_dir = "../artifacts/gcp-resnet-rff"
